name: Feature request
description: Propose a bounded evidence-normalization improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which user, evidence, or operating gap should be addressed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance evidence
      description: Describe positive and negative fixtures and expected records.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Responsibility boundary
      description: Explain why this belongs in HATE and does not duplicate final release authority.
    validations:
      required: true
