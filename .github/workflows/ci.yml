name: HATE CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: hate-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3 (node24)
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.6.0 (node24)
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Ruff
        run: uv run ruff check src/hate/schema_resources.py src/hate/plugin_runner.py src/hate/p0a_schema.py src/hate/schema_validator.py src/hate/platform_cli.py src/hate/cli.py src/hate/cli_handlers.py tests/test_schema_resources.py tests/test_platform_ops.py tools/ci/schema_meta_gate.py tools/ci/wheel_smoke.py tools/ci/docs_freshness_gate.py tools/docs/render_post_poc_status.py tools/ci/responsibility_scope_gate.py tools/docs/render_responsibility_docs.py src/hate/bridge/router.py src/hate/bridge/materializer.py tests/test_bridge_router.py tests/test_responsibility_architecture.py
      - name: Mypy critical surfaces
        run: uv run mypy
      - name: Compile
        run: uv run python -m compileall src tests
      - name: Schema meta-validation
        run: uv run python tools/ci/schema_meta_gate.py
      - name: Post-PoC generated status
        run: uv run python tools/docs/render_post_poc_status.py --check
      - name: Codemap freshness
        run: uv run python tools/codemap/update.py --check
      - name: Docs freshness gate
        run: uv run python tools/ci/docs_freshness_gate.py
      - name: Responsibility scope gate
        run: uv run python tools/ci/responsibility_scope_gate.py
      - name: Responsibility docs
        run: uv run python tools/docs/render_responsibility_docs.py

  unit-contract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3 (node24)
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.6.0 (node24)
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Unit and contract tests
        run: uv run pytest -q -m "not e2e and not subprocess and not package and not slow"

  windows-process:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3 (node24)
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.6.0 (node24)
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Process, path, and plugin tests
        run: uv run pytest -q tests/test_platform_ops.py tests/test_real_repo_operational_oss.py tests/test_adapters_coverage.py

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3 (node24)
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.6.0 (node24)
      - name: Build distributions
        run: uv build --out-dir dist
      - name: Installed wheel smoke
        run: >-
          uv run python tools/ci/wheel_smoke.py
          --wheel dist/harness_auto_test_evidence-0.3.0-py3-none-any.whl
          --fixture fixtures/golden/p0a-minimal/input

  e2e-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3 (node24)
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.6.0 (node24)
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Full regression
        run: uv run pytest -q
      - name: Product-grade evidence reports
        run: uv run python -m hate product grade-reports --docs-root docs/process --out .ci/product-grade --source-version ci
