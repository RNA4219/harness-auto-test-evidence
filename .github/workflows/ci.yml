name: HATE CI

on:
  push:
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Compile
        run: uv run python -m compileall src tests

      - name: Test
        run: uv run pytest

      - name: Product-grade evidence reports
        run: uv run python -m hate product grade-reports --docs-root docs/process --out .ci/product-grade --source-version ci
